openapi: 3.0.0
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: Backend API for managing financial records and dashboard analytics.
servers:
  - url: http://localhost:3000
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, ANALYST, VIEWER]
      responses:
        '201':
          description: User created
  /api/auth/login:
    post:
      summary: Login and get token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
  /api/records:
    get:
      summary: Get all financial records
      parameters:
        - in: query
          name: type
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: A list of records
    post:
      summary: Create a new financial record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                category:
                  type: string
                transactionDate:
                  type: string
                  format: date-time
                notes:
                  type: string
      responses:
        '201':
          description: Record created
  /api/dashboard/summary:
    get:
      summary: Get dashboard summary aggregations
      responses:
        '200':
          description: Dashboard metrics returned